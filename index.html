<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pilih Produk</title>

<style>
body{
    font-family: Arial, sans-serif;
    background-color:#f5f5f5;
}

.container{
    width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 8px;
}

h2{
    margin-bottom: 30px;
}

.product{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.info{
    font-size:16px;
}

.controls{
    display:flex;
    align-items:center;
}

button{
    width:35px;
    height:35px;
    font-size:18px;
    cursor:pointer;
}

.qty{
    width:40px;
    text-align:center;
    margin:0 8px;
    font-size:16px;
}

.total-box{
    margin-top:30px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">
<h2>Pilih Produk</h2>

<div class="product">
<div class="info">
TEH JASMINE <br> Rp 5.000
</div>
<div class="controls">
<button onclick="kurang('p1',5000)">-</button>
<input type="text" id="p1" class="qty" value="0" readonly>
<button onclick="tambah('p1',5000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
DARK CHOCOLATE <br> Rp 15.000
</div>
<div class="controls">
<button onclick="kurang('p2',15000)">-</button>
<input type="text" id="p2" class="qty" value="0" readonly>
<button onclick="tambah('p2',15000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
LEMON TEA <br> Rp 15.000
</div>
<div class="controls">
<button onclick="kurang('p3',15000)">-</button>
<input type="text" id="p3" class="qty" value="0" readonly>
<button onclick="tambah('p3',15000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
KOREAN BLUEBERRY MILK <br> Rp 15.000
</div>
<div class="controls">
<button onclick="kurang('p4',15000)">-</button>
<input type="text" id="p4" class="qty" value="0" readonly>
<button onclick="tambah('p4',15000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
GREEN TEA <br> Rp 15.000
</div>
<div class="controls">
<button onclick="kurang('p5',15000)">-</button>
<input type="text" id="p5" class="qty" value="0" readonly>
<button onclick="tambah('p5',15000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
MOJITO BUBBLEGUM <br> Rp 13.000
</div>
<div class="controls">
<button onclick="kurang('p6',13000)">-</button>
<input type="text" id="p6" class="qty" value="0" readonly>
<button onclick="tambah('p6',13000)">+</button>
</div>
</div>

<div class="product">
<div class="info">
THAI TEA <br> Rp 10.000
</div>
<div class="controls">
<button onclick="kurang('p7',10000)">-</button>
<input type="text" id="p7" class="qty" value="0" readonly>
<button onclick="tambah('p7',10000)">+</button>
</div>
</div>

<div class="total-box">
Total Harga: Rp <span id="total">0</span>
</div>

</div>

<script>

let totalHarga = 0;

function tambah(id, harga){
    let qty = document.getElementById(id);
    qty.value = parseInt(qty.value) + 1;
    totalHarga += harga;
    updateTotal();
}

function kurang(id, harga){
    let qty = document.getElementById(id);
    if(qty.value > 0){
        qty.value = parseInt(qty.value) - 1;
        totalHarga -= harga;
    }
    updateTotal();
}

function updateTotal(){
    document.getElementById("total").innerText = totalHarga.toLocaleString("id-ID");
}

</script>

</body>
</html>
